<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exámenes</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 text-gray-900">
    <header class="bg-white/80 backdrop-blur border-b">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 rounded-full bg-blue-50 ring-1 ring-blue-200 flex items-center justify-center text-blue-700">☁️</div>
          <h1 class="text-xl sm:text-2xl font-semibold">Exámenes</h1>
        </div>
        <span class="text-sm text-gray-600">Catálogo dinámico</span>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
      <section class="mb-10">
        <div class="rounded-2xl border shadow-sm bg-white p-6 sm:p-8 relative overflow-hidden">
          <div class="absolute -right-20 -top-20 h-64 w-64 bg-gradient-to-tr from-blue-200 to-cyan-200 rounded-full blur-3xl opacity-40"></div>
          <h2 class="text-3xl sm:text-4xl font-bold tracking-tight">Elige tu examen</h2>
          <p class="mt-3 text-gray-600">Selecciona un examen. El catálogo se genera desde un archivo JSON.</p>
          <div class="mt-4 flex flex-wrap gap-2">
            <span class="px-2.5 py-1 text-xs rounded-full bg-blue-50 text-blue-700 ring-1 ring-blue-200 ">Azure</span>
            <span class="px-2.5 py-1 text-xs rounded-full bg-cyan-50 text-cyan-700 ring-1 ring-cyan-200">Google Cloud</span>
          </div>
        </div>
      </section>

      <section id="examGrid" class="flex overflow-x-auto snap-x snap-mandatory gap-4 pb-2 sm:grid sm:grid-cols-2 lg:grid-cols-3 sm:gap-6 sm:overflow-visible"></section>
    </main>

    <footer class="mt-10 border-t bg-white/80 backdrop-blur">
      <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-gray-600">© Exámenes</div>
    </footer>

    <script>
      async function loadExams() {
        try {
          const res = await fetch('./examenes.json', { cache: 'no-store' });
          if (!res.ok) throw new Error('no json');
          return await res.json();
        } catch (e) {
          return [];
        }
      }
      function createCard(exam) {
        const isAzure = /az\d+/i.test(exam.name || '') || /azure/i.test(exam.title || '');
        const isGoogle = /gc|gcdl|google/i.test(exam.name || '') || /google/i.test(exam.title || '');
        const isAWS = /aws|amazon/i.test(exam.name || '') || /aws/i.test(exam.title || '');
        const accent = isAzure
          ? { bg:'bg-blue-50', text:'text-blue-700', ring:'ring-blue-200', btn:'bg-blue-600 hover:bg-blue-700' }
          : isGoogle
          ? { bg:'bg-cyan-50', text:'text-cyan-700', ring:'ring-cyan-200', btn:'bg-cyan-600 hover:bg-cyan-700' }
          : isAWS
          ? { bg:'bg-amber-50', text:'text-amber-700', ring:'ring-amber-200', btn:'bg-amber-600 hover:bg-amber-700' }
          : { bg:'bg-indigo-50', text:'text-indigo-700', ring:'ring-indigo-200', btn:'bg-indigo-600 hover:bg-indigo-700' };

        const card = document.createElement('article');
        card.className = 'group relative overflow-hidden rounded-2xl border bg-white shadow-sm hover:shadow-md transition min-w-[300px] sm:min-w-0 snap-start';

        const content = document.createElement('div');
        content.className = 'p-5 h-full flex flex-col';

        const top = document.createElement('div');
        top.className = 'flex items-center justify-between';

        const icon = document.createElement('div');
        icon.className = `h-10 w-10 rounded-full ${accent.bg} ${accent.text} flex items-center justify-center ring-1 ${accent.ring}`;
        icon.textContent = isGoogle ? '☁️' : isAzure ? '⚡' : '⚙️';

        const h3 = document.createElement('h3');
        h3.className = 'text-lg font-medium';
        h3.textContent = exam.title || exam.name;

        const badge = document.createElement('span');
        badge.className = `px-2 py-1 text-xs rounded ${accent.bg} ${accent.text} ring-1 ${accent.ring}`;
        badge.textContent = 'Disponible';

        top.appendChild(icon);
        const right = document.createElement('div');
        right.className = 'flex items-center gap-3';
        right.appendChild(h3);
        right.appendChild(badge);
        top.appendChild(right);

        const p = document.createElement('p');
        p.className = 'mt-3 text-sm text-gray-700';
        p.textContent = exam.desc || 'Cuestionario';

        const actions = document.createElement('div');
        actions.className = 'mt-auto flex flex-wrap gap-3';

        const examUrl = new URL('./Cuestionario/cuestionario.html', location.href);
        examUrl.searchParams.set('name', exam.name);
        if (exam.title) examUrl.searchParams.set('title', exam.title);
        if (exam.pregunta) examUrl.searchParams.set('preguntas', exam.pregunta);
        if (exam.apuntes) examUrl.searchParams.set('apuntes', exam.apuntes);

        const start = document.createElement('a');
        start.href = examUrl.href;
        start.className = `px-4 py-2 rounded ${accent.btn} text-white`;
        start.textContent = 'Hacer examen';

        const notes = document.createElement('a');
        notes.href = exam.apuntes || '#';
        notes.className = 'px-4 py-2 rounded border bg-white hover:bg-gray-50';
        notes.textContent = 'Ver apuntes';

        actions.appendChild(start);
        actions.appendChild(notes);

        content.appendChild(top);
        content.appendChild(p);
        content.appendChild(actions);

        const glow = document.createElement('div');
        glow.className = 'absolute -bottom-10 -right-10 h-32 w-32 rounded-full blur-2xl opacity-30';
        glow.classList.add(isGoogle ? 'bg-cyan-200' : isAzure ? 'bg-blue-200' : 'bg-indigo-200');

        card.appendChild(content);
        card.appendChild(glow);
        return card;
      }
      (async function init() {
        const grid = document.getElementById('examGrid');
        const exams = await loadExams();
        if (!Array.isArray(exams) || exams.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'text-sm text-gray-600';
          empty.textContent = 'No hay exámenes en el JSON.';
          grid.appendChild(empty);
          return;
        }
        exams.forEach(exam => grid.appendChild(createCard(exam)));
      })();
    </script>
  </body>
  </html>
