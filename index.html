<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Exámenes - Certifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .scroll-snap-container::-webkit-scrollbar { display: none; }
      .scroll-snap-container { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Estilo para el borde izquierdo del card, indicando el proveedor */
      .exam-card {
          border-left-width: 4px; /* Borde izquierdo más grueso para acentuar la organización */
          transition: all 0.2s ease-in-out;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            // Paleta de Colores del Cuestionario (Propuesta 8)
            colors: {
              'kyndryl-blue': '#0070f3', // Azul Tecnológico como acento
              'text-dark': '#293241', // Gris oscuro suave (Texto principal)
              'bg-app': '#f7f8fa', // Fondo muy ligero
              'border-subtle': '#e0e7ff', // Borde con un ligero tinte azul
            },
            boxShadow: {
              'card-shadow': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05)',
              'action': '0 4px 6px -1px rgba(0, 112, 243, 0.2), 0 2px 4px -2px rgba(0, 112, 243, 0.1)',
            }
          }
        }
      }
    </script>
  </head>

  <body class="min-h-screen bg-bg-app text-text-dark antialiased dark:bg-gray-900 dark:text-gray-100">
    
    <header class="sticky top-0 z-10 bg-white shadow-sm border-b border-border-subtle dark:bg-gray-900 dark:border-gray-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight text-text-dark dark:text-white">Certifications</h1>
        </div>
        <label class="inline-flex items-center cursor-pointer">
            <input type="checkbox" id="toggleDark" class="sr-only peer">
            <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-kyndryl-blue"></div>
            <span class="ms-3 text-sm font-medium text-gray-900 dark:text-gray-300">Modo oscuro</span>
        </label>  
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
      <section class="mb-12">
        <div class="rounded-xl bg-white p-8 sm:p-10 shadow-lg border border-border-subtle dark:bg-gray-800 dark:border-gray-700">
          <h2 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-text-dark dark:text-white">Selector de Exámenes</h2>
          <p class="mt-4 text-lg text-gray-600 max-w-2xl dark:text-gray-400">Catálogo organizado por proveedor y listo para la práctica o el examen simulado.</p>
          
          <div class="mt-6 flex flex-wrap gap-3" id="filterContainer">
            <button data-filter="all" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-kyndryl-blue text-white shadow-sm transition-colors">Todos</button>
            <button data-filter="azure" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-700 border border-gray-300 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600 dark:hover:bg-gray-600 transition-colors">Azure</button>
            <button data-filter="google" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-700 border border-gray-300 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600 dark:hover:bg-gray-600 transition-colors">Google Cloud</button>
            <button data-filter="aws" class="filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-700 border border-gray-300 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600 dark:hover:bg-gray-600 transition-colors">AWS</button>
          </div>
        </div>
      </section>

      <section class="mb-12">
        <h3 class="text-2xl font-semibold mb-6 text-text-dark border-b border-border-subtle pb-3 dark:text-white dark:border-gray-700">Planes de Estudio</h3>
        <div id="studyGrid" class="scroll-snap-container flex overflow-x-scroll snap-x snap-mandatory gap-6 pb-4 sm:grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 sm:gap-8 sm:overflow-visible">
        </div>
      </section>

      <section>
        <h3 class="text-2xl font-semibold mb-6 text-text-dark border-b border-border-subtle pb-3 dark:text-white dark:border-gray-700">Listado de Certificaciones</h3>
        
        <div id="examGrid" class="scroll-snap-container flex overflow-x-scroll snap-x snap-mandatory gap-6 pb-4 sm:grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 sm:gap-8 sm:overflow-visible">
          </div>
      </section>
    </main>

    <footer class="mt-20 border-t border-border-subtle bg-white dark:bg-gray-900 dark:border-gray-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-sm text-gray-500 flex justify-between items-center dark:text-gray-400">
        <p>© Exámenes Certificados </p>
        <p>Creado por: <span class="font-medium text-text-dark dark:text-white">Jhonathan Chaves Manzano</span></p>
      </div>
    </footer>

    <script>
      async function loadExams() {
        try {
          const res = await fetch('./examenes.json', { cache: 'no-store' });
          if (!res.ok) throw new Error('Error al cargar examenes.json');
          return await res.json();
        } catch (e) {
          return [];
        }
      }

      function createCard(exam, isStudyPlan = false) {
        // Colores de acento para la línea lateral del card
        const KYNDRYL_BLUE = '#0070f3';
        const AZURE_BLUE = '#0078d4';
        const GOOGLE_GREEN = '#34a853';
        const AWS_ORANGE = '#ff9900';
        const STUDY_INDIGO = '#4f46e5';

        const isAzure = /az\d+/i.test(exam.name || '') || /azure|microsoft/i.test(exam.title || '');
        const isGoogle = /gc|gcdl|google/i.test(exam.name || '') || /google/i.test(exam.title || '');
        const isAWS = /aws|amazon/i.test(exam.name || '') || /aws|amazon/i.test(exam.title || '');
        
        let providerColor = KYNDRYL_BLUE;
        let icon = '💻';
        if (isStudyPlan) { providerColor = STUDY_INDIGO; icon = '📚'; }
        else if (isAzure) { providerColor = AZURE_BLUE; icon = '⚡'; }
        else if (isGoogle) { providerColor = GOOGLE_GREEN; icon = '☁️'; }
        else if (isAWS) { providerColor = AWS_ORANGE; icon = '⚙️'; }

        const defaultGoogleNotes = './Apuntes/apuntesGCDL.html';

        // Estilos para los botones (Ajustados para consistencia con el cuestionario)
        const btnClasses = {
          // Botón primario: usa el azul , rounded-xl y sombra de acción
          primary: `flex-1 text-center px-4 py-2.5 rounded-xl text-white font-semibold bg-kyndryl-blue hover:bg-blue-600 transition duration-150 shadow-action`,
          // Botón secundario: borde simple, hover sutil, rounded-xl
          secondary: `flex-1 text-center px-4 py-2.5 rounded-xl border border-gray-300 bg-white text-gray-700 font-medium hover:bg-gray-50 transition duration-150 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-700`,
          // Botón de Apuntes: discreto (o principal si es plan de estudio)
          notes: `text-center px-3 py-2.5 rounded-xl border border-gray-300 bg-gray-50 text-gray-600 hover:bg-gray-100 text-sm w-full mt-3 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-700`,
          notesPrimary: `text-center px-4 py-3 rounded-xl text-white font-bold bg-indigo-600 hover:bg-indigo-700 transition duration-150 shadow-md w-full block mt-4`
        };

        // Creación del Card
        const card = document.createElement('article');
        // Estilo: rounded-2xl (como la tarjeta del cuestionario), borde sutil azul, hover sutil
        card.className = `exam-card group relative overflow-hidden rounded-2xl bg-white border border-border-subtle transition duration-300 min-w-[300px] sm:min-w-0 snap-start transform hover:shadow-lg hover:border-kyndryl-blue/50 dark:bg-gray-800 dark:border-gray-700`;
        card.style.borderLeftColor = providerColor;
        
        const content = document.createElement('div');
        content.className = 'p-6 h-full flex flex-col';

        // 1. Sección Superior: Título principal y Código (en Gris Oscuro Suave)
        const titleArea = document.createElement('div');
        titleArea.className = 'flex items-start justify-between mb-4 pb-2 border-b border-border-subtle dark:border-gray-700';

        const titleText = document.createElement('div');
        titleText.className = 'flex-grow min-w-0';

        const h3 = document.createElement('h3');
        h3.className = 'text-xl font-extrabold text-text-dark truncate dark:text-white';
        h3.textContent = exam.name || 'EXAM CODE';
        
        const nameText = document.createElement('p');
        // Título secundario más suave
        nameText.className = 'text-sm font-medium text-gray-500 mt-0.5 truncate dark:text-gray-400';
        nameText.textContent = exam.title || 'Certificación sin título';

        titleText.appendChild(h3);
        titleText.appendChild(nameText);

        // Icono y Estado
        const statusArea = document.createElement('div');
        statusArea.className = 'flex-shrink-0 ml-4 text-center';

        const iconContainer = document.createElement('div');
        iconContainer.className = 'h-8 w-8 text-2xl mb-1';
        iconContainer.textContent = icon;
        
        const badge = document.createElement('span');
        badge.className = `px-2 py-0.5 text-xs font-semibold rounded-full bg-kyndryl-blue/10 text-kyndryl-blue dark:bg-blue-900/30 dark:text-blue-200`;
        badge.textContent = 'Activo';

        statusArea.appendChild(iconContainer);
        statusArea.appendChild(badge);

        titleArea.appendChild(titleText);
        titleArea.appendChild(statusArea);

        // 2. Sección de Descripción
        const p = document.createElement('p');
        p.className = 'mt-3 text-sm text-gray-600 line-clamp-3 flex-grow dark:text-gray-400';
        p.textContent = exam.desc || 'Descripción de la certificación no disponible. Listo para practicar.';

        // Ensamblaje parcial
        content.appendChild(titleArea);
        content.appendChild(p);

        // 3. Sección de Acciones (Separada por la línea sutil)
        if (!isStudyPlan) {
            const actions = document.createElement('div');
            actions.className = 'mt-6 pt-4 border-t border-border-subtle flex flex-wrap gap-2 dark:border-gray-700';

            // Lógica de URLs (sin cambios)
            const baseUrl = new URL('./Cuestionario/cuestionario.html', location.href);
            baseUrl.searchParams.set('name', exam.name);
            if (exam.title) baseUrl.searchParams.set('title', exam.title);
            if (exam.pregunta) {
            const preg = /^https?:\/\//i.test(exam.pregunta) ? exam.pregunta : `../${exam.pregunta}`;
            baseUrl.searchParams.set('preguntas', preg);
            }
            if (exam.apuntes) {
            const ap = /^https?:\/\//i.test(exam.apuntes) ? exam.apuntes : `../${exam.apuntes}`;
            baseUrl.searchParams.set('apuntes', ap);
            }

            const examenUrl = new URL(baseUrl.href);
            examenUrl.searchParams.set('mode', 'examen');
            const practicaUrl = new URL(baseUrl.href);
            practicaUrl.searchParams.set('mode', 'practica');

            // Botones (con clases actualizadas)
            const btnExamen = document.createElement('a');
            btnExamen.href = examenUrl.href;
            btnExamen.className = btnClasses.primary;
            btnExamen.textContent = 'Iniciar Examen';

            const btnPractica = document.createElement('a');
            btnPractica.href = practicaUrl.href;
            btnPractica.className = btnClasses.secondary;
            btnPractica.textContent = 'Práctica';

            actions.appendChild(btnExamen);
            actions.appendChild(btnPractica);
            content.appendChild(actions);
        }

        // Botón de Apuntes
        const apuntesUrl = exam.apuntes || (isGoogle ? defaultGoogleNotes : null);
        if (apuntesUrl) {
           const btnApuntes = document.createElement('a');
           btnApuntes.href = apuntesUrl;
           // Si es plan de estudio, usamos estilo primario y texto diferente
           btnApuntes.className = isStudyPlan ? btnClasses.notesPrimary : btnClasses.notes;
           btnApuntes.textContent = isStudyPlan ? 'Abrir Plan de Estudio 📖' : 'Ver Apuntes 📄';
           content.appendChild(btnApuntes);
        }

        card.appendChild(content);
        
        return card;
      }
      
      // Función para renderizar exámenes en el grid principal
      function renderExams(exams) {
          const grid = document.getElementById('examGrid');
          grid.innerHTML = '';
          
          if (exams.length === 0) {
             const empty = document.createElement('div');
             empty.className = 'text-gray-500 p-8 w-full text-center col-span-full border-dashed border-2 border-gray-200 rounded-xl';
             empty.textContent = 'No se encontraron certificaciones para este filtro.';
             grid.appendChild(empty);
             return;
          }

          exams.forEach(exam => {
              grid.appendChild(createCard(exam, false));
          });
      }

      // Inicialización
      (async function init() {
        const grid = document.getElementById('examGrid');
        const studyGrid = document.getElementById('studyGrid');
        const exams = await loadExams();
        
        if (!Array.isArray(exams) || exams.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'text-xl text-gray-500 p-8 w-full text-center border-dashed border-2 border-gray-300 rounded-xl col-span-full';
          empty.textContent = '🥲 No hay exámenes disponibles. Por favor, verifica el archivo examenes.json.';
          grid.className = 'flex justify-center items-center';
          grid.appendChild(empty);
          return;
        }
        
        // Separar planes de estudio y exámenes regulares
        const studyPlans = [];
        const regularExams = [];

        exams.forEach(exam => {
            if (/ka0s|github/i.test(exam.name)) {
                studyPlans.push(exam);
            } else {
                regularExams.push(exam);
            }
        });

        // Renderizar Planes de Estudio (siempre visibles)
        studyPlans.forEach(exam => studyGrid.appendChild(createCard(exam, true)));

        // Renderizar Exámenes Regulares (inicialmente todos)
        renderExams(regularExams);

        // Configurar Filtros
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Actualizar estado visual
                buttons.forEach(b => {
                    // Resetear estilo inactivo
                    b.className = 'filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-gray-100 text-gray-700 border border-gray-300 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600 dark:hover:bg-gray-600 transition-colors';
                });
                // Establecer estilo activo
                btn.className = 'filter-btn px-3 py-1.5 text-sm font-medium rounded-full bg-kyndryl-blue text-white shadow-sm transition-colors';

                const filter = btn.getAttribute('data-filter');
                let filtered = regularExams;

                if (filter === 'azure') {
                    filtered = regularExams.filter(e => /az\d+/i.test(e.name || '') || /azure|microsoft/i.test(e.title || ''));
                } else if (filter === 'google') {
                    filtered = regularExams.filter(e => /gc|gcdl|google/i.test(e.name || '') || /google/i.test(e.title || ''));
                } else if (filter === 'aws') {
                    filtered = regularExams.filter(e => /aws|amazon/i.test(e.name || '') || /aws|amazon/i.test(e.title || ''));
                }

                renderExams(filtered);
            });
        });
      })();
    </script>
  </body>
</html>
