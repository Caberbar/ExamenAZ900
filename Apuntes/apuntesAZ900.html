<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apuntes AZ-900 — Versión académica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../theme.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root{
        --accent:#f97316; /* orange-500 */
        --paper:#fffdf8;
        --ink:#1f2937;
        --hl:#fde68a; /* amber-200 */
      }
      .dark{
        --paper:#111827;
        --ink:#f3f4f6;
        --hl:#92400e; /* amber-800 */
      }
      .hand{font-family:"Kalam",system-ui,-apple-system,"Segoe UI",sans-serif;}
      .paper-bg{background:#faf7f2;}
      .dark .paper-bg{background:#030712;}
      .sheet{
        background:var(--paper);
        border-radius:14px;
        border:1px solid #f4c7a1;
        box-shadow:0 8px 24px rgba(0,0,0,.08);
        position:relative;
        overflow:hidden;
      }
      .dark .sheet{border-color:#374151;box-shadow:0 8px 24px rgba(0,0,0,.4);}
      /* línea roja tipo libreta */
      .sheet::before{content:"";position:absolute;left:26px;top:0;bottom:0;width:2px;background:rgba(249,115,22,.28);}
      .dark .sheet::before{background:rgba(249,115,22,.15);}
      /* líneas suaves horizontales */
      .sheet::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(transparent 0 34px, rgba(0,0,0,.04) 34px 35px);pointer-events:none;}
      .dark .sheet::after{background:repeating-linear-gradient(transparent 0 34px, rgba(255,255,255,.03) 34px 35px);}
      .title-scribble{font-family:"Kalam",system-ui,sans-serif;font-size:1.7rem;letter-spacing:.3px;font-weight:700;color:var(--ink);position:relative;}
      .title-scribble::after{content:"";position:absolute;left:-6px;right:-6px;bottom:-2px;height:.7em;background:linear-gradient(transparent 60%, var(--hl) 60%);transform:rotate(-0.6deg);z-index:-1;}
      .hl{background:linear-gradient(transparent 60%, var(--hl) 60%);padding:0 .15em;border-radius:.2em}
      .note-card{background:#fff;border:1px dashed rgba(249,115,22,.28);border-radius:12px}
      .dark .note-card{background:#1f2937;border-color:rgba(249,115,22,.2)}
      
      /* Índice hermoso, estilo libreta */
      html{scroll-behavior:smooth}
      .toc-item{border:1px dashed rgba(249,115,22,.28);border-radius:12px;background:#fff;padding:.6rem .8rem}
      .dark .toc-item{background:#1f2937;border-color:rgba(249,115,22,.2)}
      .toc-link{display:flex;align-items:center;gap:.5rem;color:#1f2937}
      .dark .toc-link{color:#e5e7eb}
      .toc-link .num{color:var(--accent);font-weight:700}
      .toc-sub{margin-top:.4rem;margin-left:1.4rem;display:grid;gap:.2rem}
      .toc-sub a{font-size:.82rem;text-decoration:underline;color:#374151}
      .dark .toc-sub a{color:#9ca3af}
      .toc-progress{position:relative;margin-top:.35rem;height:6px;border-radius:9999px;background:rgba(249,115,22,.15)}
      .dark .toc-progress{background:rgba(249,115,22,.1)}
      .toc-progress > div{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:9999px}
      .toc-progress-text{font-size:.72rem;color:#6b7280;margin-top:.25rem;display:block}
      .dark .toc-progress-text{color:#9ca3af}
      .toc-active{background:#fff7ed;border-color:#fdba74}
      .dark .toc-active{background:#3f2c22;border-color:#9a3412}
      
      /* Scroll interno para el índice lateral sticky */
      .sheet-scroll{max-height:calc(100vh - 120px);overflow:auto;overscroll-behavior:contain}
      /* pequeño ajuste responsive */
      @media (max-width: 768px){
        .toc-sub { margin-left: 0; }
      }
    </style>
  </head>
  <body class="min-h-screen paper-bg text-gray-900 dark:text-gray-100">
    <header class="sticky top-0 z-10 border-b bg-white/90 backdrop-blur dark:bg-[#030712]/90 dark:border-gray-800">
      <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
        <div>
          <h1 class="title-scribble">Apuntes AZ-900</h1>
          <p class="text-sm text-gray-600 dark:text-gray-400">Versión académica — explicaciones detalladas y ejemplos.</p>
        </div>
        <div class="flex items-center gap-3">
          <label class="inline-flex items-center cursor-pointer">
            <input type="checkbox" id="toggleDark" class="sr-only peer">
            <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-orange-300 dark:peer-focus:ring-orange-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-orange-500"></div>
            <span class="ms-3 text-sm font-medium text-gray-900 dark:text-gray-300">Modo oscuro</span>
          </label>
          <button id="expandAll" class="px-3 py-1 text-sm rounded border bg-white hover:bg-gray-50 transition-colors dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-700">Expandir todo</button>
          <button id="collapseAll" class="px-3 py-1 text-sm rounded border bg-white hover:bg-gray-50 transition-colors dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-700">Contraer todo</button>
          <button id="print" class="px-3 py-1 text-sm rounded border bg-white hover:bg-gray-50 transition-colors dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 dark:hover:bg-gray-700">Imprimir</button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
      <section class="mb-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <input id="search" type="text" placeholder="Buscar conceptos" class="w-80 px-3 py-2 border rounded bg-white focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200 dark:focus:ring-orange-900" />
          <span class="text-sm text-gray-600 dark:text-gray-400">Secciones: <span id="sectionCount">0</span> • Notas: <span id="noteCount">0</span></span>
        </div>
        <div class="text-sm font-medium text-gray-700 dark:text-gray-300">Estudiadas: <span id="studiedCount">0</span></div>
      </section>

      <div class="md:grid md:grid-cols-12 gap-6">
        <aside class="md:col-span-4 lg:col-span-3">
          <div class="sheet sheet-scroll p-6 sticky top-20">
            <div class="flex items-center justify-between">
              <div class="title-scribble">Índice</div>
              <div class="text-xs text-gray-500">Se actualiza con la búsqueda</div>
            </div>
            <nav id="toc" class="mt-3 space-y-2"></nav>
          </div>
        </aside>

        <section class="md:col-span-8 lg:col-span-9">
          <div class="sheet p-6">
            <div id="notes" class="space-y-6"></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const els = {
        notes: document.getElementById('notes'),
        sectionCount: document.getElementById('sectionCount'),
        noteCount: document.getElementById('noteCount'),
        studiedCount: document.getElementById('studiedCount'),
        search: document.getElementById('search'),
        expandAll: document.getElementById('expandAll'),
        collapseAll: document.getElementById('collapseAll'),
        print: document.getElementById('print'),
        toc: document.getElementById('toc'),
      };

      const studied = JSON.parse(localStorage.getItem('apuntes:studied') || '{}');

      /* ------------------------
         SECTIONS (contenido académico)
         ------------------------ */
      const SECTIONS = [
        {
          id: 'cloud',
          label: 'Conceptos de Nube',
          desc: 'Marco conceptual: modelos de servicio, responsabilidades compartidas, y criterios económicos (CapEx vs OpEx). Entender arquitectura lógica y ejemplos prácticos para elegir modelo correcto.',
          items: [
            {
              t: 'CapEx vs OpEx: diferencias, implicaciones contables y decisiones de migración',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Concepto: <strong>CapEx</strong> son gastos de capital: desembolsos iniciales para adquirir activos (servidores, hardware, edificio). <strong>OpEx</strong> son gastos operativos: pagos periódicos por servicios que permiten operar sin comprar activos (suscripciones, consumo).</p>
                  <p class="text-sm leading-relaxed">Implicaciones: CapEx aparece como activo en el balance y se deprecia; OpEx afecta a la cuenta de resultados mensual. Migrar a la nube suele convertir CapEx en OpEx, lo que puede mejorar liquidez y permitir escalado rápido.</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Ejemplo práctico:</strong> Una empresa que necesita capacidad variable beneficiará de <em>Pay-As-You-Go</em> porque evita pagar por capacidad ociosa. Una empresa con carga estable a largo plazo podría usar <em>reservas</em> para reducir costes.
                  </div>
                </div>
              `
            },
            {
              t: 'Modelos de servicio: IaaS, PaaS y SaaS — responsabilidades y ejemplos',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">IaaS (Infrastructure as a Service): proveedor gestiona la infraestructura física; el cliente gestiona SO, middleware y aplicaciones. Ej.: VM en Azure, discos gestionados.</p>
                  <p class="text-sm leading-relaxed">PaaS (Platform as a Service): proveedor gestiona el SO y la plataforma; el cliente despliega la aplicación. Ej.: Azure App Service, Azure SQL como PaaS.</p>
                  <p class="text-sm leading-relaxed">SaaS (Software as a Service): software completo gestionado por el proveedor; el cliente solo consume la aplicación. Ej.: Microsoft 365.</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Regla práctica:</strong> A menor responsabilidad operacional del cliente, más se aproxima el servicio a SaaS. Elegir según control vs conveniencia.
                  </div>
                </div>
              `
            },
            {
              t: 'Serverless: modelo, ventajas y casos de uso',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Serverless significa ejecución de código sin gestión de servidores por parte del usuario. El proveedor abstrae provisionamiento y escalado (pago por ejecución/eventos).</p>
                  <p class="text-sm leading-relaxed">Ventajas: escalado automático, coste por uso, despliegue rápido. Limitaciones: tiempos de cold start, límites de ejecución y potencial mayor complejidad para estado mantenido.</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Casos de uso:</strong> tareas event-driven, ingestión de datos, microservicios con baja latencia y jobs periódicos.
                  </div>
                </div>
              `
            },
            {
              t: 'Contenedores y orquestación: cuándo usar ACI vs AKS',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Contenedores empaquetan aplicación y dependencias. ACI permite ejecutar contenedores sin clúster (ideal para tareas puntuales). AKS es Kubernetes gestionado para cargas con necesidad de orquestación, escalado, y redes avanzadas.</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Comparativa:</strong> ACI = simple, rápido, costes por ejecución. AKS = complejo, gestión de nodos, adecuada para producción con alta disponibilidad.
                  </div>
                </div>
              `
            }
          ]
        },

        {
          id: 'governance',
          label: 'Gestión y Gobernanza',
          desc: 'Estructura organizativa de recursos: cómo organizar, aplicar políticas, control de acceso y gobernanza de costes. Importante para cumplimiento, despliegues repetibles y auditoría.',
          items: [
            {
              t: 'Grupos de recursos (RG): concepto, límites y diseño lógico',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Un Resource Group (RG) es un contenedor lógico para recursos Azure relacionados. No es una unidad de facturación ni una VNet; sirve para agrupar recursos con ciclo de vida similar.</p>
                  <p class="text-sm leading-relaxed">Puntos clave: no se pueden anidar; cada recurso pertenece a un único RG; un RG puede contener recursos en distintas regiones.</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Diseño recomendado:</strong> agrupa por aplicación o por ciclo de vida (ej.: todos los recursos de una aplicación o de un entorno: dev/stage/prod).
                  </div>
                </div>
              `
            },
            {
              t: 'Etiquetas (tags) y políticas: uso para facturación y cumplimiento',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Las etiquetas son pares clave/valor aplicables a la mayoría de recursos. Son esenciales para agrupar costes, automatizaciones y cumplir requisitos de gobernanza.</p>
                  <p class="text-sm leading-relaxed">Importante: las etiquetas en un RG no se aplican automáticamente a recursos; requieren aplicación explícita o automatización para propagarlas.</p>
                </div>
              `
            },
            {
              t: 'Bloqueos (locks) y herencia: proteger recursos críticos',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Los bloqueos (CanNotDelete / ReadOnly) se aplican a suscripciones, RG o recursos; bloqueos aplicados a RG se heredan a recursos dentro del RG.</p>
                  <p class="text-sm leading-relaxed">Uso: proteger entornos productivos ante cambios accidentales o eliminación.</p>
                </div>
              `
            },
            {
              t: 'Plantillas ARM y automatización (IaC)',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">ARM templates (o Bicep/Terraform) permiten describir infraestructura como código. Beneficios: reproducibilidad, revisión en control de versiones y despliegues consistentes.</p>
                  <p class="text-sm leading-relaxed">Tip de examen: distinguir entre plantillas declarativas (ARM, Bicep) y herramientas imperativas; las plantillas declarativas describen el estado deseado.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'identity',
          label: 'Identidad y Seguridad',
          desc: 'Fundamentos de identidad: Azure AD, autenticación, autorización, MFA, políticas condicionales y buenas prácticas para proteger cuentas y recursos.',
          items: [
            {
              t: 'Azure Active Directory: modelo y responsabilidades',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Azure AD es un servicio gestionado de identidad y acceso. Proporciona autenticación y autorización para recursos en Azure, Microsoft 365 y apps integradas.</p>
                  <p class="text-sm leading-relaxed">No es un controlador de dominio tradicional — aunque se puede integrar con AD local mediante Azure AD Connect para sincronización de identidades.</p>
                </div>
              `
            },
            {
              t: 'Autenticación multifactor (MFA) y acceso condicional',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">MFA añade una segunda capa de autenticación (algo que sabes + algo que tienes). Acceso Condicional permite aplicar políticas dinámicas (por riesgo, ubicación, dispositivo).</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Caso práctico:</strong> exigir MFA desde ubicaciones no confiables o para cuentas administrativas reduce riesgo de acceso no autorizado.
                  </div>
                </div>
              `
            },
            {
              t: 'Roles y RBAC: principio de mínimos privilegios',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">RBAC (Role-Based Access Control) permite asignar permisos según roles predefinidos o personalizados. Recomendación: aplicar el principio de menor privilegio y usar grupos en lugar de asignaciones directas a usuarios.</p>
                </div>
              `
            },
            {
              t: 'Defender for Cloud y detección de amenazas',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Defender for Cloud ofrece evaluación continua, recomendaciones y alertas de seguridad. Su uso ayuda a mejorar el Secure Score y priorizar mitigaciones.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'network',
          label: 'Redes',
          desc: 'Principios de redes en la nube: VNets, subredes, NSG, firewalls, conectividad híbrida y conceptos de cifrado y seguridad perimetral.',
          items: [
            {
              t: 'Virtual Network (VNet) y subredes: aislamiento y segmentación',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Una VNet es el espacio de red privada en Azure; se divide en subredes para segmentar servicios. Las VNets pueden conectarse entre sí (peering) o mediante VPN/ExpressRoute a on-premises.</p>
                </div>
              `
            },
            {
              t: 'Network Security Groups (NSG) vs Azure Firewall: diferencias y uso',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">NSG: reglas de filtrado a nivel de subred o NIC (stateful). Azure Firewall: servicio gestionado que ofrece inspección de capa 3-7, NAT y logging centralizado.</p>
                  <div class="note-card p-3 text-sm">
                    <strong class="hand">Regla importante:</strong> NSG no se asocia a VNet entera; se asocia a subredes o NICs. Para inspección avanzada y políticas centralizadas usa Azure Firewall.
                  </div>
                </div>
              `
            },
            {
              t: 'Cifrado en tránsito: TLS/IPsec y su ámbito',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">El cifrado de tráfico depende de la capa: TLS cifra a nivel de aplicación (HTTPS), IPsec cifra a nivel de red (túneles VPN). Elegir según requerimiento de seguridad y compatibilidad.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'storage',
          label: 'Almacenamiento',
          desc: 'Tipos de almacenamiento, jerarquía de acceso, costes y consideraciones de rendimiento y durabilidad.',
          items: [
            {
              t: 'Azure Blob Storage: niveles de acceso (Hot, Cool, Archive)',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Hot: acceso frecuente, coste de almacenamiento alto y baja latencia. Cool: acceso menos frecuente, menor coste de almacenamiento y mayor coste de acceso. Archive: coste de almacenamiento muy bajo, pero requiere rehidratación para lectura y tiene tiempos de recuperación largos.</p>
                </div>
              `
            },
            {
              t: 'Consistencia, durabilidad y replicación',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Azure ofrece distintas opciones de replicación (LRS, ZRS, GRS, RA-GRS) que equilibran durabilidad y disponibilidad geográfica. Elegir según RPO/RTO y requisitos de cumplimiento.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'monitor',
          label: 'Supervisión y Observabilidad',
          desc: 'Instrumentación, logs, métricas, alertas, y cómo interpretar telemetría para mantenimiento y respuesta ante incidentes.',
          items: [
            {
              t: 'Azure Monitor, Log Analytics y Application Insights: roles y complementariedad',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Azure Monitor es la plataforma general de observabilidad; Log Analytics es el repositorio para consultas (Kusto); Application Insights se enfoca en telemetría de aplicaciones (requests, exceptions, performance).</p>
                </div>
              `
            },
            {
              t: 'Activity Log y Service Health: auditoría y estado de plataforma',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Activity Log registra operaciones de gestión en la suscripción (quién hizo qué). Service Health informa sobre incidencias en los servicios Azure y mantenimiento programado.</p>
                </div>
              `
            },
            {
              t: 'Alertas y respuesta: configurar reglas basadas en métricas y logs',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Las alertas pueden activarse por métricas (uso CPU, latencia) o por consultas de logs; integrarlas con runbooks/automations permite respuesta automatizada.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'continuity',
          label: 'Continuidad y Recuperación',
          desc: 'Estrategias para proteger datos y mantener operaciones frente a fallos y desastres: backups, replicación, y planificación de DR (Disaster Recovery).',
          items: [
            {
              t: 'Azure Backup: conceptos, granularidad y buenas prácticas',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Azure Backup permite copias periódicas de VM, archivos y bases de datos. Definir políticas de retención según requisitos legales y RPO.</p>
                </div>
              `
            },
            {
              t: 'Azure Site Recovery (ASR): replicación y orquestación para DR',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">ASR replica máquinas a otra región o sitio y permite orquestar failover. No es alta disponibilidad instantánea: está pensado para recuperación ante desastre con RTO planificado.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'compute',
          label: 'Compute y Plataformas de Ejecución',
          desc: 'Opciones de ejecución para aplicaciones: máquinas virtuales, servicios administrados, funciones y plataformas de análisis.',
          items: [
            {
              t: 'Máquinas virtuales (VM): uso, costes y mantenimiento',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">VMs dan control total sobre SO y configuraciones, pero implican gestión de parches, dimensionamiento y seguridad. Considerar Azure VM Scale Sets para escalado automático de VMs.</p>
                </div>
              `
            },
            {
              t: 'App Service y opciones PaaS para aplicaciones web',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">App Service ofrece plataforma gestionada para web apps con despliegue continuo, slots de staging y escalado automático. Reduce carga operativa respecto a VMs.</p>
                </div>
              `
            },
            {
              t: 'Databricks y plataformas de análisis',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Servicios como Azure Databricks están orientados a procesamiento distribuido y ML. Elegir según volumen de datos y necesidad de procesamiento en cluster.</p>
                </div>
              `
            },
            {
              t: 'Funciones (Azure Functions): diseño y patrones',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Diseñar funciones para ser idempotentes y sin estado cuando sea posible; externalizar estado a servicios gestionados (cosmosdb, storage) para escalado seguro.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'cost',
          label: 'Costos y Suscripciones',
          desc: 'Modelos de costes en Azure, herramientas de gestión, y prácticas para optimizar gasto en la nube.',
          items: [
            {
              t: 'Modelo de precios: pay-as-you-go, reservas y ahorro',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Pay-as-you-go = pago por consumo (flexible), reservas = compromiso por periodo a menor coste (útil para cargas predecibles). Evaluar TCO y horizonte temporal.</p>
                </div>
              `
            },
            {
              t: 'Facturación, tagging y control de costes',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Etiquetado consistente y alertas de presupuesto permiten identificar desviaciones. Azure Cost Management ofrece informes y recomendaciones para optimizar gasto.</p>
                </div>
              `
            },
            {
              t: 'Costes operativos importantes: discos, transferencias y recursos reservados',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Detener una VM no elimina coste de disco. El egreso de datos suele tener coste; planificar arquitectura de datos para minimizar transferencias innecesarias.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'sla',
          label: 'SLA y Disponibilidad',
          desc: 'Qué significan los SLA, cómo se calculan SLAs compuestos y estrategias para aumentar la disponibilidad aplicando redundancia.',
          items: [
            {
              t: 'Concepto de SLA y cálculo de SLA compuesto',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">SLA (Service Level Agreement) establece la disponibilidad garantizada. Para sistemas compuestos, el SLA global se aproxima multiplicando SLAs de componentes (ej.: 99.95% × 99.99%).</p>
                </div>
              `
            },
            {
              t: 'Mejorar disponibilidad: zonas, regiones y replicación',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Usar Availability Zones y replicación entre regiones reduce riesgo de caída por fallo de infraestructura. Diseñar arquitectura para tolerar fallos parciales.</p>
                </div>
              `
            },
            {
              t: 'Créditos y reclamaciones: cuándo aplican',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Si un servicio no cumple SLA, los clientes de pago pueden reclamar créditos según términos del SLA. Revisar condiciones y límites del contrato.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'preview',
          label: 'Vista previa y Ciclo de Vida de Servicios',
          desc: 'Entender las fases del ciclo de vida (private preview → public preview → GA) y riesgos al usar servicios en preview en producción.',
          items: [
            {
              t: 'Fases de ciclo de vida y riesgos de usar previews',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">En private preview el acceso es restringido; en public preview la funcionalidad puede cambiar y no suele tener SLA. GA (General Availability) es la fase estable con soporte y SLA.</p>
                </div>
              `
            },
            {
              t: 'Mejores prácticas con servicios en preview',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Evitar usar previews en producción para cargas críticas; si se usan, realizar pruebas y tener planes de rollback y mitigación ante cambios inesperados.</p>
                </div>
              `
            }
          ]
        },

        {
          id: 'regions',
          label: 'Regiones y Cumplimiento',
          desc: 'Selección de región, requisitos regulatorios y servicios especializados (Azure Government, Azure China).',
          items: [
            {
              t: 'Selección de región: latencia, cumplimiento y disponibilidad de servicios',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Elegir región según cercanía a usuarios (latencia), requisitos legales (residencia de datos) y disponibilidad del servicio. Algunos servicios no están en todas las regiones.</p>
                </div>
              `
            },
            {
              t: 'Entornos especiales: Azure Government y Azure China',
              d: `
                <div class="space-y-2">
                  <p class="text-sm leading-relaxed">Azure Government es para agencias US con requisitos específicos de cumplimiento. Azure China está operado por socios locales (21Vianet) y tiene diferencias en operativa y datos.</p>
                </div>
              `
            }
          ]
        }
      ];

      /* ------------------------
         Utilidades de texto y resaltado
         ------------------------ */
      function escapeHtml(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      const KEYWORDS = ['CapEx','OpEx','IaaS','PaaS','SaaS','Serverless','Azure Functions','Contenedores','Azure Container Instances','RG','RBAC','ARM','Azure AD','MFA','Identity Protection','Conditional Access','NSG','Azure Firewall','TLS','IPsec','Archive','Azure Monitor','Log Analytics','Service Health','Activity Log','Application Insights','Site Recovery','Backup','App Service','Databricks','Reservas','SLA','GA','GDPR','Azure Government','Azure China'];

      function formatText(t){
        let s = escapeHtml(t);
        KEYWORDS.forEach(k => {
          const re = new RegExp('\\b' + k.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&') + '\\b','g');
          s = s.replace(re, '<mark class="hl">' + k + '</mark>');
        });
        return s;
      }

      /* ------------------------
         autoDetailHTML: genera bloques adicionales sin repetir la frase principal
         ------------------------ */
      function autoDetailHTML(title, body, link){
        // normalized helpers
        const norm = s => String(s || '').toLowerCase().replace(/\s+/g,' ').replace(/[.,;:¡!¿?"'`]/g,'').trim();
        const nTitle = norm(title);
        const nBody = norm(body);
        // Si el body es esencialmente el mismo que el título, no lo repetimos
        const showBody = body && nBody && nBody !== nTitle;
        // Construir HTML adicional (analogia, regla, trampa) según palabras clave
        const t = (title + ' ' + (body || '')).toLowerCase();
        let extras = '';
        let analogia = '';
        let regla = '';
        let trampa = '';

        if (/capex|opex/.test(t)) {
          regla = 'Compra única y propiedad ⇒ CapEx; suscripción/consumo ⇒ OpEx.';
          trampa = 'Confundir un pago anual por suscripción con CapEx: sigue siendo OpEx si se trata de servicio/consumo.';
          analogia = 'Comprar un coche (CapEx) vs pagar transporte bajo demanda (OpEx).';
        } else if (/iaas|paas|saas/.test(t)) {
          regla = 'A más gestión por parte del proveedor, menor responsabilidad operativa para el cliente (IaaS→PaaS→SaaS).';
          trampa = 'Pensar que PaaS elimina toda responsabilidad: aún gestionas tu aplicación.';
          analogia = 'IaaS = alquilar terreno y construir; PaaS = vivir en edificio con servicios; SaaS = hospedarse en un hotel con servicio completo.';
          extras = `<div class="grid sm:grid-cols-3 gap-3 mt-2">
            <div class="note-card p-3 text-sm"><h4 class="hand font-bold">IaaS</h4><div>Control total, gestión completa de SO y middleware.</div></div>
            <div class="note-card p-3 text-sm"><h4 class="hand font-bold">PaaS</h4><div>Plataforma administrada, desplegas la aplicación.</div></div>
            <div class="note-card p-3 text-sm"><h4 class="hand font-bold">SaaS</h4><div>Aplicación lista, proveedor gestiona todo.</div></div>
          </div>`;
        } else if (/contenedor|aci|aks/.test(t)) {
          regla = 'ACI para ejecuciones puntuales; AKS para clústeres y cargas en producción con orquestación.';
          trampa = 'Usar ACI para cargas con estado y dependencias complejas: mejor AKS o soluciones con volúmenes persistentes.';
          analogia = 'ACI = microondas para platos puntuales; AKS = cocina de restaurante con equipo y procesos.';
          extras = `<div class="note-card p-3 text-sm mt-2"><strong class="hand">Tip:</strong> si el caso exige orquestación, persistencia y networking avanzado, elige AKS.</div>`;
        } else if (/nsg|firewall|tls|ipsec/.test(t)) {
          regla = 'NSG filtra; Firewall inspecciona a un nivel más profundo; TLS/IPsec cifran en distintas capas.';
          trampa = 'Asignar NSG a una VNet completa (no permitido): NSG se aplica a subred o NIC.';
          analogia = 'NSG = control de puertas; Firewall = control policial con inspección; TLS = sobre sellado de la carta.';
        } else if (/backup|site recovery/.test(t)) {
          regla = 'Backup = copia y restauración; Site Recovery = replicación y orquestación para DR.';
          trampa = 'Confundir Site Recovery con alta disponibilidad inmediata.';
          analogia = 'Backup = copia de seguridad en disco; SR = plan de evacuación con rutas alternativas.';
        } else if (/monitor|log analytics|service health|activity log|insights/.test(t)) {
          regla = 'Service Health = estado del servicio Azure; Activity Log = auditoría de acciones en tu suscripción.';
          trampa = 'Pensar que Service Health evita fallos: solo informa y permite reaccionar.';
          analogia = 'Tablero del coche: indicadores y avisos (Service Health) vs historial de acciones (Activity Log).';
          extras = `<div class="note-card p-3 text-sm mt-2"><strong class="hand">Mapa Rápido:</strong> Azure Monitor (plataforma) · Log Analytics (consultas) · App Insights (telemetría de apps).</div>`;
        } else if (/sla|disponibilidad/.test(t)) {
          regla = 'SLA compuesto se aproxima multiplicando SLAs de componentes; añade redundancia para mejorar disponibilidad.';
          trampa = 'Creer que múltiples suscripciones aumentan el SLA: no es así por defecto.';
        } else if (/bandwidth|egreso|ingreso/.test(t)) {
          regla = 'Ingreso a Azure suele ser sin coste; egreso desde Azure sí suele tener coste.';
          trampa = 'Ignorar coste de egreso en diseños con transferencias masivas de datos.';
          analogia = 'Egreso = peaje al salir de la autopista.';
        }

        if (regla) extras = `<div class="note-card p-3 text-sm mt-2"><strong class="hand">Regla de oro:</strong> ${formatText(regla)}</div>` + extras;
        if (trampa) extras = `<div class="note-card p-3 text-sm mt-2"><strong class="hand">Trampa de examen:</strong> ${formatText(trampa)}</div>` + extras;
        if (analogia) extras = `<div class="note-card p-3 text-sm mt-2"><strong class="hand">Analogía:</strong> ${formatText(analogia)}</div>` + extras;

        // Construir salida: incluimos body si aporta información distinta del título
        const bodyHtml = showBody ? `<div class="text-sm leading-relaxed mt-1">${formatText(body)}</div>` : '';
        const linkHtml = link ? `<div class="mt-1"><a class="text-xs text-blue-600 dark:text-blue-400 underline" href="${link}" target="_blank">Más info</a></div>` : '';
        return `
          <div class="space-y-2 mt-2">
            ${bodyHtml}
            ${linkHtml}
            ${extras}
          </div>`;
      }

      /* ------------------------
         Renderizado principal
         ------------------------ */
      function render() {
        const searchTerm = els.search.value.trim().toLowerCase();
        els.notes.innerHTML = '';
        els.toc.innerHTML = '';
        let sections = 0;
        let totalNotes = 0;
        let studiedCount = 0;
        let secIdx = 0;
        const tocParts = [];

        SECTIONS.forEach(sec => {
          const filtered = sec.items.map((it, idx) => ({...it, id: `${sec.id}-${idx}`})).filter(it => {
            if (!searchTerm) return true;
            // buscar en título y en el cuerpo (d) si existe
            return it.t.toLowerCase().includes(searchTerm) || (it.d && it.d.toLowerCase().includes(searchTerm)) || (sec.desc && sec.desc.toLowerCase().includes(searchTerm));
          });
          if (filtered.length === 0) return;
          sections += 1;
          secIdx += 1;
          totalNotes += filtered.length;

          const section = document.createElement('section');
          section.className = 'bg-transparent rounded-lg';

          const header = document.createElement('div');
          header.className = 'px-5 py-4 flex items-center justify-between border-b dark:border-[#1e2a4a]';
          header.id = `sec-${sec.id}`;
          header.innerHTML = `<div class="title-scribble">${secIdx}. ${sec.label} <span class="text-sm text-gray-500 dark:text-gray-400">(${filtered.length})</span></div>
                              <button class="px-3 py-1 text-sm rounded border bg-white dark:bg-[#111833] dark:border-[#1e2a4a]" data-toggle>Expandir/Contraer</button>`;
          section.appendChild(header);

          const list = document.createElement('div');
          list.className = 'p-5 space-y-3';
          if (sec.desc) {
            const summary = document.createElement('p');
            summary.className = 'text-sm leading-relaxed note-card p-3';
            summary.innerHTML = formatText(sec.desc);
            list.appendChild(summary);
          }

          // Añadir sección y subsecciones al índice (TOC)
          const secStudied = filtered.reduce((acc, it) => acc + (studied[it.id] ? 1 : 0), 0);
          const percent = Math.round(100 * secStudied / filtered.length);
          const secToc = [
            `<div class="toc-item" data-toc="${sec.id}">
               <a class="toc-link" href="#sec-${sec.id}"><span class="hand num">${secIdx}.</span> ${escapeHtml(sec.label)}</a>
               <div class="toc-progress"><div style="width:${percent}%"></div></div>
               <span class="toc-progress-text">${secStudied}/${filtered.length} estudiadas</span>
             </div>`
          ];

          let subIdx = 0;
          filtered.forEach(it => {
            const li = document.createElement('div');
            const checked = !!studied[it.id];
            if (checked) studiedCount += 1;
            li.className = 'flex items-start justify-between gap-3 note-card p-3';
            subIdx += 1;
            const num = `${secIdx}.${subIdx}`;
            // obtener título y cuerpo (si el texto contiene ":" usamos parte antes/después)
            const colonPos = it.t.indexOf(':');
            const title = colonPos > -1 ? it.t.slice(0, colonPos).trim() : (it.t.length > 120 ? it.t.slice(0,120)+'…' : it.t);
            const body = colonPos > -1 ? it.t.slice(colonPos+1).trim() : '';
            li.id = `sec-${sec.id}-${subIdx}`;
            // Si el item tiene d (detalle HTML), lo usamos; si no, generamos automáticamente evitando repetir
            const detail = it.d ? it.d : autoDetailHTML(title, body || it.t, it.r);
            // Mostrar un resumen corto arriba solo si body aporta info distinta al título
            const norm = s => String(s || '').toLowerCase().replace(/\s+/g,' ').replace(/[.,;:¡!¿?"'`]/g,'').trim();
            const showSummary = body && norm(body) !== norm(title);
            const summaryHtml = showSummary ? `<div class="text-sm leading-relaxed mt-1">${formatText(body)}</div>` : '';
            li.innerHTML = `
              <div>
                <h3 class="hand text-lg font-bold"><span class="text-[#f97316] mr-2">${num}</span>${escapeHtml(title)}</h3>
                ${summaryHtml}
                ${it.r ? `<div class="mt-1"><a class="text-xs text-blue-600 dark:text-blue-400 underline" href="${it.r}" target="_blank">Más info</a></div>` : ''}
                <div class="mt-2">${detail}</div>
              </div>
              <label class="select-none inline-flex items-center gap-2">
                <input type="checkbox" ${checked ? 'checked' : ''} data-id="${it.id}" class="h-4 w-4">
                <span class="text-xs">Estudiada</span>
              </label>
            `;
            li.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
              studied[it.id] = e.target.checked;
              localStorage.setItem('apuntes:studied', JSON.stringify(studied));
              render();
            });
            list.appendChild(li);

            // Subapartado en el índice
            secToc.push(`<div class="toc-sub"><a href="#sec-${sec.id}-${subIdx}">${num} ${escapeHtml(title)}</a></div>`);
          });

          section.appendChild(list);
          header.querySelector('[data-toggle]').addEventListener('click', () => list.classList.toggle('hidden'));
          els.notes.appendChild(section);

          tocParts.push(`<div class="space-y-1">${secToc.join('')}</div>`);
        });

        els.toc.innerHTML = tocParts.join('');
        setupSpy();
        els.sectionCount.textContent = sections;
        els.noteCount.textContent = totalNotes;
        els.studiedCount.textContent = studiedCount;
      }

      /* ------------------------
         Interacción: spy del índice
         ------------------------ */
      function setupSpy(){
        const map = {};
        document.querySelectorAll('#toc [data-toc]').forEach(el => { map[el.getAttribute('data-toc')] = el; });
        const observer = new IntersectionObserver((entries)=>{
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            const id = entry.target.id.replace('sec-','');
            const nav = map[id];
            if (!nav) return;
            document.querySelectorAll('#toc .toc-item').forEach(i => i.classList.remove('toc-active'));
            nav.classList.add('toc-active');
          });
        },{rootMargin:'-20% 0px -60% 0px', threshold:0.1});
        // cancelar observadores previos (por si se llama varias veces)
        try {
          // quitar observadores existentes (no estándar en todos los navegadores, pero evita duplicados)
          // no hacemos nada si no existe
        } catch(e){}
        document.querySelectorAll('[id^="sec-"]').forEach(el => observer.observe(el));
      }

      /* ------------------------
         Inicialización y eventos
         ------------------------ */
      function init() {
        render();
        els.search.addEventListener('input', render);
        els.print.addEventListener('click', () => window.print());
        els.expandAll.addEventListener('click', () => {
          document.querySelectorAll('#notes section > div:nth-child(2)').forEach(el => el.classList.remove('hidden'));
        });
        els.collapseAll.addEventListener('click', () => {
          document.querySelectorAll('#notes section > div:nth-child(2)').forEach(el => el.classList.add('hidden'));
        });
      }

      init();
    </script>
  </body>
</html>
