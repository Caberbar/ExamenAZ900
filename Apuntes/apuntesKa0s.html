      function parseMarkdown(md) {
        if (!md) return '';
        let html = md.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        html = html.replace(/^### (.*$)/gim, '<h5>$1</h5>');
        html = html.replace(/^## (.*$)/gim, '<h4>$1</h4>');
        html = html.replace(/^# (.*$)/gim, ''); 
        html = html.replace(/^\* (.*$)/gim, '<li>$1</li>');
        html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
        html = html.replace(/`(.*?)`/gim, '<code>$1</code>');
        html = html.replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>');
        html = html.replace(/\n\n/gim, '</p><p>');
        html = '<p>' + html + '</p>';
        html = html.replace(/\n/g, ' ');
        html = html.replace(/(<li>.*?<\/li>)+/gim, '<ul>$&</ul>');
        return html;
      }

## Objetivo del día
Al final de este día debes ser capaz de:
*   Explicar Ka0s en 2–3 minutos como un “organismo” (cerebro, músculo, memoria, sentidos, sistema nervioso).
*   Señalar en el repositorio dónde vive cada parte (rutas concretas).
*   Entender por qué \`audit/\` es central y cómo se usa como “verdad del sistema”.

## Por qué esto importa
Ka0s no es un conjunto de scripts sueltos. Es una plataforma con una idea fuerte:
*   El repositorio es **código + operaciones + seguridad + evidencia**.
*   Si una automatización no deja evidencia, operativamente “no existe”.
*   La modularidad existe para que puedas reutilizar y escalar.

Piensa Ka0s como un organismo:
*   **Cerebro (GitHub Actions)**: decide qué hacer y orquesta el flujo.
*   **Músculo (Kubernetes + scripts)**: ejecuta despliegues y auditorías en el entorno real.
*   **Sentidos (Zabbix / Wazuh / ELK)**: observan disponibilidad, seguridad y logs.
*   **Memoria (iTop + \`audit/\`)**: registra el estado operacional (tickets) y la evidencia de ejecuciones.
*   **Sistema nervioso (n8n)**: conecta señales y acciones.

## Mapa del repositorio
*   **Cerebro**: workflows y actions reutilizables (\`.github/workflows/\`)
*   **Músculo**: scripts operativos y manifests (\`devops/core/k8s/\`)
*   **Sentidos**: definición/operación de observabilidad (\`core/ai/prompt_*.md\`)
*   **Memoria**: iTop y Evidencia (\`audit/\`)
*   **Sistema nervioso**: n8n

## Paso a paso
### Paso 1 — Aprende el vocabulario
*   **Atómicos**: automatismos de una acción, combinables.
*   **Efímeros**: acciones muy cortas.
*   **Inspector**: sistema de auditoría/resultado.
*   **Número Aureo (3)**: conseguir resultado en menos de 3 pasos.

### Paso 2 — Ubica la documentación base
Lee [ka0s.md](core/docs/ka0s/ka0s.md) para entender el Core Orchestrator.

### Paso 3 — Lee la Constitución
Lee [prompt_ka0s.md](core/ai/prompt_ka0s.md):
*   **Evidencia**: todo deja rastro en \`audit/\`.
*   **SSH First**: se opera en el entorno real.
*   **JSON por defecto**: salidas estructuradas.

## Objetivo del día
Al final de este día debes ser capaz de:
*   Explicar qué activa Ka0s y qué no.
*   Seguir el workflow principal de principio a fin.

## Por qué esto importa
El orquestador es la pieza que transforma un commit en una ejecución auditable.
*   No sabrás por qué un cambio disparó (o no) automatizaciones.
*   No sabrás dónde mirar cuando algo falla.

## Dónde verlo en el repo
*   Workflow principal: \`kaos.yml\`
*   Evidencia típica: \`audit/kaos\`

## Paso a paso
### Paso 1 — Entiende los disparadores (triggers)
Revisa el bloque \`on:\` en \`kaos.yml\`. Define qué eventos (push) y qué rutas activan el pipeline.

### Paso 2 — Entiende permisos y variables
Las variables \`KAOS_*\` son metadatos clave:
*   \`KAOS_CODE\`: run_id
*   \`KAOS_MODULE\`: etiqueta del módulo
*   \`KAOS_PATH_RESUME\`: ruta de evidencia

### Paso 3 — Sigue el job principal
1.  **Checkout**: clona el repo.
2.  **Validación**: verifica extensiones permitidas.
3.  **JSON del evento**: guarda "qué pasó" para auditoría.
4.  **Lista de archivos**: evidencia explícita de cambios.
5.  **Subida de evidencias**: commit/push a \`audit/\`.
6.  **Selección de módulos**: dispatcher que elige el subworkflow.

## Errores típicos
*   **No se ejecuta**: revisa \`on.paths\`.
*   **No hay evidencia**: revisa step de commit/push.

      function render() {
        const searchTerm = els.search.value.trim().toLowerCase();
        els.notes.innerHTML = '';
        els.toc.innerHTML = '';
        let totalNotes = 0;
        let studiedTotal = 0;
        
        SECTIONS.forEach((sec, secIdx) => {
          const filtered = sec.items.map((it, idx) => ({...it, id: `${sec.id}-${idx}`})).filter(it => {
            if (!searchTerm) return true;
            return it.t.toLowerCase().includes(searchTerm) || (it.d && it.d.toLowerCase().includes(searchTerm));
          });
          
          if (filtered.length === 0) return;
          totalNotes += filtered.length;

          // TOC Folder
          const folderOpen = true; // Always open for now
          const secDiv = document.createElement('div');
          secDiv.className = 'border-b border-[#d0d7de] dark:border-[#30363d] last:border-0';
          
          const folderHeader = document.createElement('div');
          folderHeader.className = 'px-3 py-2 flex items-center gap-2 hover:bg-[#f6f8fa] dark:hover:bg-[#161b22] cursor-pointer text-[#1f2328] dark:text-[#c9d1d9]';
          folderHeader.innerHTML = `
            <svg class="w-4 h-4 text-[#54aeff]" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75Z"></path></svg>
            <span class="font-semibold truncate">${sec.label}</span>
          `;
          secDiv.appendChild(folderHeader);

          const folderContent = document.createElement('div');
          // folderContent.className = 'pl-2'; // Indent
          
          filtered.forEach((it) => {
            const checked = !!studied[it.id];
            if (checked) studiedTotal += 1;

            // TOC Item (File)
            const fileLink = document.createElement('a');
            fileLink.href = `#note-${it.id}`;
            fileLink.className = `block px-3 py-1.5 flex items-center gap-2 text-[#1f2328] dark:text-[#c9d1d9] hover:text-[#0969da] dark:hover:text-[#58a6ff] hover:underline decoration-dashed text-xs pl-8`;
            fileLink.innerHTML = `
                <svg class="w-3.5 h-3.5 text-[#656d76] dark:text-[#7d8590]" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.228.504l2.932 2.932c.32.319.504.764.504 1.228v8.59c0 .966-.784 1.75-1.75 1.75H3.75A1.75 1.75 0 0 1 2 13.25v-11.5Z"></path></svg>
                <span class="truncate ${checked ? 'line-through opacity-50' : ''}">${it.t}</span>
            `;
            folderContent.appendChild(fileLink);

            // Note Content (README style)
            const noteContainer = document.createElement('div');
            noteContainer.id = `note-${it.id}`;
            noteContainer.className = 'mb-8 scroll-mt-24';
            
            const renderedContent = parseMarkdown(it.md);
            
            noteContainer.innerHTML = `
                <div class="file-header flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-[#656d76] dark:text-[#7d8590]" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.228.504l2.932 2.932c.32.319.504.764.504 1.228v8.59c0 .966-.784 1.75-1.75 1.75H3.75A1.75 1.75 0 0 1 2 13.25v-11.5Z"></path></svg>
                        <span class="font-mono font-semibold">${it.t}.md</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="text-xs cursor-pointer select-none flex items-center gap-1 px-2 py-1 rounded hover:bg-[#eaeef2] dark:hover:bg-[#30363d] transition-colors border border-transparent hover:border-[#d0d7de] dark:hover:border-[#6e7681]">
                            <input type="checkbox" ${checked ? 'checked' : ''} data-id="${it.id}" class="accent-[#238636]">
                            <span>Mark as read</span>
                        </label>
                    </div>
                </div>
                <div class="file-content prose prose-sm md:prose-base dark:prose-invert max-w-none">
                    ${renderedContent}
                </div>
            `;
            
            noteContainer.querySelector('input').addEventListener('change', (e) => {
                studied[it.id] = e.target.checked;
                localStorage.setItem('ka0s:studied', JSON.stringify(studied));
                render(); // Re-render to update TOC strikethrough and progress
            });

            els.notes.appendChild(noteContainer);
          });

          secDiv.appendChild(folderContent);
          els.toc.appendChild(secDiv);
        });

        // Update Progress
        const percent = totalNotes > 0 ? Math.round((studiedTotal / totalNotes) * 100) : 0;
        els.studiedCount.textContent = `${percent}%`;
        els.studiedCount.className = `px-1.5 py-0.5 rounded-full text-[10px] text-white font-bold ${percent === 100 ? 'bg-[#238636]' : 'bg-[#1f6feb]'}`;
      }

      function setupSpy(){
        // Simplified spy not needed with this new layout, 
        // as we are using anchors directly.
      }

      function init() {
        render();
        els.search.addEventListener('input', render);
        
        // Expand/Collapse now just scroll to top/bottom for simplicity in this view
        // or could toggle folder visibility if implemented.
        if(els.expandAll) els.expandAll.style.display = 'none'; 
        if(els.collapseAll) els.collapseAll.style.display = 'none';

        document.getElementById('logoutBtn').addEventListener('click', () => {
          if(confirm('¿Cerrar sesión de Ka0s Training?')) {
            sessionStorage.removeItem('ka0s_auth');
            window.location.href = 'loginKa0s.html';
          }
        });
      }

      init();
    </script>
