      function parseMarkdown(md) {
        if (!md) return '';
        let html = md.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        html = html.replace(/^### (.*$)/gim, '<h5>$1</h5>');
        html = html.replace(/^## (.*$)/gim, '<h4>$1</h4>');
        html = html.replace(/^# (.*$)/gim, ''); 
        html = html.replace(/^\* (.*$)/gim, '<li>$1</li>');
        html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
        html = html.replace(/`(.*?)`/gim, '<code>$1</code>');
        html = html.replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>');
        html = html.replace(/\n\n/gim, '</p><p>');
        html = '<p>' + html + '</p>';
        html = html.replace(/\n/g, ' ');
        html = html.replace(/(<li>.*?<\/li>)+/gim, '<ul>$&</ul>');
        return html;
      }

## Objetivo del día
Al final de este día debes ser capaz de:
*   Explicar Ka0s en 2–3 minutos como un “organismo” (cerebro, músculo, memoria, sentidos, sistema nervioso).
*   Señalar en el repositorio dónde vive cada parte (rutas concretas).
*   Entender por qué \`audit/\` es central y cómo se usa como “verdad del sistema”.

## Por qué esto importa
Ka0s no es un conjunto de scripts sueltos. Es una plataforma con una idea fuerte:
*   El repositorio es **código + operaciones + seguridad + evidencia**.
*   Si una automatización no deja evidencia, operativamente “no existe”.
*   La modularidad existe para que puedas reutilizar y escalar.

Piensa Ka0s como un organismo:
*   **Cerebro (GitHub Actions)**: decide qué hacer y orquesta el flujo.
*   **Músculo (Kubernetes + scripts)**: ejecuta despliegues y auditorías en el entorno real.
*   **Sentidos (Zabbix / Wazuh / ELK)**: observan disponibilidad, seguridad y logs.
*   **Memoria (iTop + \`audit/\`)**: registra el estado operacional (tickets) y la evidencia de ejecuciones.
*   **Sistema nervioso (n8n)**: conecta señales y acciones.

## Mapa del repositorio
*   **Cerebro**: workflows y actions reutilizables (\`.github/workflows/\`)
*   **Músculo**: scripts operativos y manifests (\`devops/core/k8s/\`)
*   **Sentidos**: definición/operación de observabilidad (\`core/ai/prompt_*.md\`)
*   **Memoria**: iTop y Evidencia (\`audit/\`)
*   **Sistema nervioso**: n8n

## Paso a paso
### Paso 1 — Aprende el vocabulario
*   **Atómicos**: automatismos de una acción, combinables.
*   **Efímeros**: acciones muy cortas.
*   **Inspector**: sistema de auditoría/resultado.
*   **Número Aureo (3)**: conseguir resultado en menos de 3 pasos.

### Paso 2 — Ubica la documentación base
Lee [ka0s.md](core/docs/ka0s/ka0s.md) para entender el Core Orchestrator.

### Paso 3 — Lee la Constitución
Lee [prompt_ka0s.md](core/ai/prompt_ka0s.md):
*   **Evidencia**: todo deja rastro en \`audit/\`.
*   **SSH First**: se opera en el entorno real.
*   **JSON por defecto**: salidas estructuradas.
            `},

## Objetivo del día
Al final de este día debes ser capaz de:
*   Explicar qué activa Ka0s y qué no.
*   Seguir el workflow principal de principio a fin.
*   Identificar qué evidencia se genera y en qué ruta.

## Por qué esto importa
El orquestador es la pieza que transforma un commit en una ejecución auditable.
*   No sabrás por qué un cambio disparó (o no) automatizaciones.
*   No sabrás dónde mirar cuando algo falla.

## Dónde verlo en el repo
*   Workflow principal: \`kaos.yml\`
*   Evidencia típica: \`audit/kaos\`

## Paso a paso
### Paso 1 — Entiende los disparadores (triggers)
Revisa el bloque \`on:\` en \`kaos.yml\`. Define qué eventos (push) y qué rutas activan el pipeline.

### Paso 2 — Entiende permisos y variables
Las variables \`KAOS_*\` son metadatos clave:
*   \`KAOS_CODE\`: run_id
*   \`KAOS_MODULE\`: etiqueta del módulo
*   \`KAOS_PATH_RESUME\`: ruta de evidencia

### Paso 3 — Sigue el job principal
1.  **Checkout**: clona el repo.
2.  **Validación**: verifica extensiones permitidas.
3.  **JSON del evento**: guarda "qué pasó" para auditoría.
4.  **Lista de archivos**: evidencia explícita de cambios.
5.  **Subida de evidencias**: commit/push a \`audit/\`.
6.  **Selección de módulos**: dispatcher que elige el subworkflow.

## Errores típicos
*   **No se ejecuta**: revisa \`on.paths\`.
*   **No hay evidencia**: revisa step de commit/push.

Al final de este día debes ser capaz de:

SSH First evita operar sobre entornos simulados. Inspeccionas y actúas sobre el control plane real, reduciendo drift.

*   Workflow reusable: \`ssh-connect.yml\`

1.  **No interactivo**: jamás pedir input.
2.  **Exit codes**: 0 éxito, >0 error.
3.  **Salida estructurada**: JSON o logs parseables.
4.  **Timeouts**: evita comandos colgados.

      function render() {
        const searchTerm = els.search.value.trim().toLowerCase();
        els.notes.innerHTML = '';
        els.toc.innerHTML = '';
        let sections = 0;
        let totalNotes = 0;
        let studiedCount = 0;
        let secIdx = 0;
        const tocParts = [];

        SECTIONS.forEach(sec => {
          const filtered = sec.items.map((it, idx) => ({...it, id: `${sec.id}-${idx}`})).filter(it => {
            if (!searchTerm) return true;
            return it.t.toLowerCase().includes(searchTerm) || (it.d && it.d.toLowerCase().includes(searchTerm));
          });
          if (filtered.length === 0) return;
          sections += 1;
          secIdx += 1;
          totalNotes += filtered.length;

          const section = document.createElement('section');
          section.className = 'bg-transparent rounded-lg';

          const header = document.createElement('div');
          header.className = 'px-5 py-4 flex items-center justify-between border-b dark:border-indigo-800';
          header.id = `sec-${sec.id}`;
          header.innerHTML = `<div class="title-scribble text-xl">${sec.label} <span class="text-sm text-gray-500 dark:text-gray-400 ui-font">(${filtered.length})</span></div>
                              <button class="btn-soft ui-font" data-toggle>Ver</button>`;
          section.appendChild(header);

          const list = document.createElement('div');
          list.className = 'p-5 space-y-6';
          if (sec.desc) {
            const summary = document.createElement('p');
            summary.className = 'text-sm leading-relaxed note-card p-4 mb-4 ui-font';
            summary.innerHTML = sec.desc;
            list.appendChild(summary);
          }

          const secStudied = filtered.reduce((acc, it) => acc + (studied[it.id] ? 1 : 0), 0);
          const percent = Math.round(100 * secStudied / filtered.length);
          const secToc = [
            `<div class="toc-item" data-toc="${sec.id}">
               <a class="toc-link" href="#sec-${sec.id}"><span class="hand num">${secIdx}.</span> ${sec.label}</a>
               <div class="toc-progress"><div style="width:${percent}%"></div></div>
               <span class="toc-progress-text">${secStudied}/${filtered.length} completados</span>
             </div>`
          ];

          filtered.forEach((it, subIdx) => {
            const li = document.createElement('div');
            const checked = !!studied[it.id];
            if (checked) studiedCount += 1;
            li.className = 'note-card p-6 transition-all hover:shadow-md';
            
            // Render Markdown
            const renderedContent = parseMarkdown(it.md);
            
            li.innerHTML = `
              <div class="flex items-start justify-between gap-4 mb-4 border-b border-indigo-100 dark:border-indigo-900 pb-3">
                <h3 class="hand text-xl font-bold text-gray-800 dark:text-gray-100">${it.t}</h3>
                <label class="select-none inline-flex flex-col items-center gap-1 cursor-pointer">
                  <input type="checkbox" ${checked ? 'checked' : ''} data-id="${it.id}" class="h-6 w-6 text-indigo-600 rounded focus:ring-indigo-500">
                  <span class="text-[10px] text-gray-500 font-medium ui-font">Hecho</span>
                </label>
              </div>
              <div class="text-sm text-gray-600 dark:text-gray-400 mb-4 italic ui-font">${it.d}</div>
              <div class="md-content">
                ${renderedContent}
              </div>
            `;
            li.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
              studied[it.id] = e.target.checked;
              localStorage.setItem('ka0s:studied', JSON.stringify(studied));
              render();
            });
            list.appendChild(li);
          });

          section.appendChild(list);
          header.querySelector('[data-toggle]').addEventListener('click', () => list.classList.toggle('hidden'));
          els.notes.appendChild(section);

          tocParts.push(`<div class="space-y-1">${secToc.join('')}</div>`);
        });

        els.toc.innerHTML = tocParts.join('');
        setupSpy();
        els.sectionCount.textContent = sections;
        els.noteCount.textContent = totalNotes;
        els.studiedCount.textContent = studiedCount;
      }

      function setupSpy(){
        const map = {};
        document.querySelectorAll('#toc [data-toc]').forEach(el => { map[el.getAttribute('data-toc')] = el; });
        const observer = new IntersectionObserver((entries)=>{
          entries.forEach(entry => {
            if (!entry.isIntersecting) return;
            const id = entry.target.id.replace('sec-','');
            const nav = map[id];
            if (!nav) return;
            document.querySelectorAll('#toc .toc-item').forEach(i => i.classList.remove('toc-active'));
            nav.classList.add('toc-active');
          });
        },{rootMargin:'-20% 0px -60% 0px', threshold:0.1});
        document.querySelectorAll('[id^="sec-"]').forEach(el => observer.observe(el));
      }

      function init() {
        render();
        els.search.addEventListener('input', render);
        els.expandAll.addEventListener('click', () => {
          document.querySelectorAll('#notes section > div:nth-child(2)').forEach(el => el.classList.remove('hidden'));
        });
        els.collapseAll.addEventListener('click', () => {
          document.querySelectorAll('#notes section > div:nth-child(2)').forEach(el => el.classList.add('hidden'));
        });
      }

      init();
    </script>
  </body>
