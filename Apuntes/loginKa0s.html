<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ka0s Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .hand { font-family: "Kalam", cursive; }
        .ui-font { font-family: "Inter", sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-indigo-100 overflow-hidden">
        <div class="bg-indigo-600 p-8 text-center">
            <h1 class="text-3xl font-bold text-white hand mb-2">Ka0s Training</h1>
            <p class="text-indigo-100 ui-font text-sm">Área restringida para formación operativa</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1 ui-font">Usuario</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                        placeholder="Ingresa tu usuario">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1 ui-font">Contraseña</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <div id="errorMessage" class="hidden text-red-500 text-sm text-center font-medium bg-red-50 p-2 rounded-lg border border-red-100">
                    Credenciales incorrectas
                </div>

                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors shadow-lg shadow-indigo-200 ui-font">
                    Acceder al Plan de Estudio
                </button>
            </form>
        </div>
        
        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <a href="../index.html" class="text-sm text-slate-500 hover:text-indigo-600 font-medium ui-font">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // Credenciales hardcodeadas (Simulación de .env para sitio estático)
        const VALID_USER = "b2bmasorange";
        const VALID_PASS = "ka0straining2026";

        // Comprobar si ya está logueado
        if (sessionStorage.getItem('ka0s_auth') === 'true') {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectTarget = urlParams.get('redirect') || 'apuntesKa0s.html';
            window.location.href = redirectTarget;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            if (user === VALID_USER && pass === VALID_PASS) {
                // Login correcto
                sessionStorage.setItem('ka0s_auth', 'true');
                // Efecto visual de éxito
                errorMsg.classList.add('hidden');
                const btn = this.querySelector('button');
                btn.textContent = 'Accediendo...';
                btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                btn.classList.add('bg-green-600');
                
                // Redirect logic
                const urlParams = new URLSearchParams(window.location.search);
                const redirectTarget = urlParams.get('redirect') || 'apuntesKa0s.html';

                setTimeout(() => {
                    window.location.href = redirectTarget;
                }, 500);
            } else {
                // Error
                errorMsg.classList.remove('hidden');
                // Vibración simple
                const card = document.querySelector('.max-w-md');
                card.classList.add('animate-pulse');
                setTimeout(() => card.classList.remove('animate-pulse'), 200);
            }
        });
    </script>
</body>
</html>
