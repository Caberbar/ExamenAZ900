        // Init
        (function() {
            const container = document.getElementById('notesContainer');
            const toc = document.getElementById('toc');
            const themeToggle = document.getElementById('themeToggle');
            const searchInput = document.getElementById('searchInput');
            const progressText = document.getElementById('progressText');
            
            // Render Content
            let totalItems = 0;
            SECTIONS.forEach(sec => {
                // TOC Item
                const tocLink = document.createElement('a');
                tocLink.href = `#${sec.id}`;
                tocLink.className = 'block py-2 px-4 text-sm text-slate-500 hover:text-slate-900 dark:hover:text-white border-l-2 border-transparent hover:border-slate-300 transition-all';
                tocLink.innerHTML = `<i class="fa-solid ${sec.icon} w-5"></i> ${sec.title}`;
                toc.appendChild(tocLink);

                // Section Content
                const sectionEl = document.createElement('section');
                sectionEl.id = sec.id;
                sectionEl.className = 'scroll-mt-28';
                
                let itemsHtml = '';
                sec.items.forEach((item, idx) => {
                    totalItems++;
                    itemsHtml += `
                        <div class="note-card bg-white dark:bg-dark-card rounded-xl p-6 md:p-8 border border-slate-200 dark:border-slate-700 mb-6">
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100">${item.title}</h3>
                                <label class="cursor-pointer">
                                    <input type="checkbox" class="read-check w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500" data-id="${sec.id}-${idx}">
                                </label>
                            </div>
                            <div class="prose-custom text-slate-600 dark:text-slate-400 text-sm md:text-base">
                                ${item.content}
                            </div>
                        </div>
                    `;
                });

                sectionEl.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <span class="w-10 h-10 rounded-lg bg-brand-50 dark:bg-brand-900/30 text-brand-600 flex items-center justify-center text-xl">
                            <i class="fa-solid ${sec.icon}"></i>
                        </span>
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">${sec.title}</h2>
                    </div>
                    ${itemsHtml}
                `;
                container.appendChild(sectionEl);
            });

            // Theme Toggle
            themeToggle.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme:dark', document.documentElement.classList.contains('dark') ? '1' : '0');
            });

            // Scroll Spy & Progress
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('#toc a');
            
            window.addEventListener('scroll', () => {
                let current = '';
                const scrollY = window.scrollY;
                const totalHeight = document.body.scrollHeight - window.innerHeight;
                
                // Progress Bar
                const progress = (scrollY / totalHeight) * 100;
                document.getElementById('scrollProgress').style.width = `${progress}%`;

                // Spy
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (scrollY >= (sectionTop - 150)) {
                        current = '#' + section.id;
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove('active-toc');
                    if(link.getAttribute('href') === current) {
                        link.classList.add('active-toc');
                    }
                });
            });

            // Search Filter
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.note-card').forEach(card => {
                    const text = card.textContent.toLowerCase();
                    card.style.display = text.includes(term) ? 'block' : 'none';
                });
            });

            // Progress Tracking
            const checks = document.querySelectorAll('.read-check');
            function updateReadProgress() {
                const checked = document.querySelectorAll('.read-check:checked').length;
                const pct = Math.round((checked / totalItems) * 100);
                progressText.textContent = `${pct}% Completado`;
            }
            checks.forEach(c => c.addEventListener('change', updateReadProgress));
        })();
    </script>
