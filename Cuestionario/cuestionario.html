<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuestionario de Certificación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Estilo base para las opciones (buttons) */
      .option-btn {
        text-align: left;
        padding: 1rem 1.25rem; /* p-4 p-5 */
        border-radius: 0.75rem; /* rounded-xl */
        border: 1px solid theme('colors.border-subtle');
        background-color: white;
        transition: all 0.15s ease-in-out;
      }
      /* Efecto hover/foco para las opciones */
      .option-btn:not([disabled]):hover, 
      .option-btn:not([disabled]):focus {
        border-color: theme('colors.kyndryl-blue');
        box-shadow: 0 0 0 2px theme('colors.kyndryl-blue.200');
        background-color: theme('colors.kyndryl-blue.50');
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            // Paleta del Diseño Final
            colors: {
              'kyndryl-blue': '#0070f3',
              'text-dark': '#293241', // Gris oscuro suave (más elegante que el negro puro)
              'bg-app': '#f7f8fa', // Fondo muy ligero
              'border-subtle': '#e0e7ff', // Borde con un ligero tinte azul
              'success': '#10b981', 
              'danger': '#ef4444',
            },
            boxShadow: {
                'action': '0 4px 6px -1px rgba(0, 112, 243, 0.2), 0 2px 4px -2px rgba(0, 112, 243, 0.1)',
                'success-light': '0 4px 6px -1px rgba(16, 185, 129, 0.2), 0 2px 4px -2px rgba(16, 185, 129, 0.1)',
            }
          }
        }
      }
    </script>
  </head>

  <body class="min-h-screen bg-bg-app text-text-dark antialiased">
    
    <header class="sticky top-0 z-10 bg-white border-b border-border-subtle shadow-sm">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between flex-wrap gap-3">
        <div>
          <h1 id="examTitle" class="text-xl sm:text-2xl font-bold tracking-tight text-text-dark">Cuestionario</h1>
          <p id="examSubtitle" class="text-xs sm:text-sm text-gray-500 mt-0.5">Modo de práctica | Prueba de certificación</p>
        </div>
        
        <div class="flex items-center gap-2 flex-wrap w-full sm:w-auto">
          <a id="menuBtn" href="../index.html" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-sm font-medium w-full sm:w-auto text-center">Menú</a>
          <a id="apuntesLink" href="#" class="px-3 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 text-sm font-medium w-full sm:w-auto text-center">Apuntes</a>
          <a id="modeSwitch" href="#" class="px-3 py-2 rounded-lg bg-kyndryl-blue text-white hover:bg-blue-700 text-sm font-semibold shadow-action w-full sm:w-auto text-center">Cambiar Modo</a>
        </div>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-10">
      
      <section id="status" class="mb-6 bg-white rounded-xl border border-border-subtle p-4 shadow-md">
        
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 text-sm font-medium mb-3">
          <div id="progress" class="text-kyndryl-blue font-semibold">Pregunta <span id="current">0</span>/<span id="total">0</span></div>
          <div id="score" class="text-text-dark">Precisión: <span id="accuracy">0%</span> (<span id="points">0</span> de <span id="answered">0</span>)</div>
        </div>

        <div class="w-full h-2 bg-gray-200 rounded-full">
          <div id="progressBar" class="h-2 bg-kyndryl-blue rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
      </section>

      <section id="card" class="bg-white shadow-xl rounded-2xl border border-kyndryl-blue/30 p-6 sm:p-8">
        
        <h2 id="question" class="text-base sm:text-xl font-extrabold mb-6 text-text-dark leading-relaxed">Cargando preguntas…</h2>
        
        <div id="options" class="grid gap-4">
          </div>
        
        <div id="feedback" class="mt-6 p-4 rounded-lg text-sm hidden font-medium">
          </div>
        
        <div class="mt-8 pt-6 border-t border-border-subtle flex flex-wrap justify-between items-center gap-3">
          
          <button id="resetBtn" class="px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-100 text-sm font-medium transition duration-150 w-full sm:w-auto">Reiniciar</button>
          
          <div class="flex gap-3 w-full sm:w-auto">
            <button id="checkBtn" class="hidden px-5 py-2.5 rounded-xl bg-success text-white hover:bg-emerald-700 font-semibold transition duration-150 shadow-success-light w-full sm:w-auto">Comprobar</button>
            <button id="nextBtn" class="hidden px-5 py-2.5 rounded-xl bg-kyndryl-blue text-white hover:bg-blue-700 font-semibold transition duration-150 shadow-action w-full sm:w-auto">Siguiente →</button>
          </div>
        </div>
      </section>

      <section id="final" class="hidden mt-8 bg-white shadow-xl rounded-2xl border border-kyndryl-blue/30 p-6 sm:p-8 text-center">
        <h2 class="text-2xl font-extrabold mb-3 text-kyndryl-blue">¡Prueba Finalizada!</h2>
        <p class="mb-6 text-lg text-gray-700">Tu precisión final es:</p>
        <p id="finalScore" class="font-extrabold text-5xl text-text-dark mb-6">0%</p>
        <button id="restartBtn" class="px-6 py-3 rounded-xl bg-kyndryl-blue text-white hover:bg-blue-700 font-bold shadow-action">Volver a empezar</button>
      </section>
      
    </main>

    <script src="../app.js"></script>
  </body>
</html>
