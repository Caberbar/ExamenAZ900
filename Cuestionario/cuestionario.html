<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#0ea5e9',
                            600: '#0284c7',
                        },
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        
        /* Correct/Incorrect States */
        .state-correct {
            background-color: #f0fdf4 !important; /* green-50 */
            border-color: #22c55e !important; /* green-500 */
            color: #15803d !important; /* green-700 */
        }
        .dark .state-correct {
            background-color: rgba(34, 197, 94, 0.1) !important;
            border-color: #22c55e !important;
            color: #4ade80 !important; /* green-400 */
        }

        .state-incorrect {
            background-color: #fef2f2 !important; /* red-50 */
            border-color: #ef4444 !important; /* red-500 */
            color: #b91c1c !important; /* red-700 */
        }
        .dark .state-incorrect {
            background-color: rgba(239, 68, 68, 0.1) !important;
            border-color: #ef4444 !important;
            color: #f87171 !important; /* red-400 */
        }

        .state-selected {
            background-color: #f0f9ff !important; /* sky-50 */
            border-color: #0ea5e9 !important; /* sky-500 */
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.1);
        }
        .dark .state-selected {
            background-color: rgba(14, 165, 233, 0.1) !important;
            border-color: #0ea5e9 !important;
        }
    </style>
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-dark-bg dark:text-slate-100 transition-colors duration-200 flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-dark-card border-b border-slate-200 dark:border-slate-800 h-16 flex-shrink-0">
        <div class="max-w-5xl mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div class="h-6 w-px bg-slate-200 dark:bg-slate-700"></div>
                <div>
                    <h1 id="examTitle" class="font-bold text-sm md:text-base leading-tight">Loading...</h1>
                    <p id="examSubtitle" class="text-xs text-slate-500 dark:text-slate-400">Certification Prep</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div id="scoreContainer" class="hidden md:flex items-center gap-2 px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-800 text-xs font-semibold text-slate-600 dark:text-slate-300">
                    <i class="fa-solid fa-crosshairs"></i>
                    <span id="accuracy">0%</span>
                </div>
                <button id="modeSwitch" class="text-xs font-medium px-4 py-2 rounded-lg bg-white border border-slate-200 hover:bg-slate-50 dark:bg-dark-card dark:border-slate-700 dark:hover:bg-slate-800 transition-colors shadow-sm">
                    Exam Mode
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl mx-auto w-full px-4 py-8 flex flex-col">
        
        <!-- Progress -->
        <div class="mb-8">
            <div class="flex justify-between text-xs font-medium text-slate-500 mb-2">
                <span>Question <span id="current">1</span> of <span id="total">--</span></span>
                <span>Progress</span>
            </div>
            <div class="h-2 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                <div id="progressBar" class="h-full bg-brand-500 transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div id="card" class="bg-white dark:bg-dark-card border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6 md:p-10 flex-1 flex flex-col animate-fade-in">
            
            <div class="flex-1">
                <h2 id="question" class="text-xl md:text-2xl font-semibold mb-8 text-slate-900 dark:text-white leading-relaxed">
                    Initializing question bank...
                </h2>

                <div id="options" class="flex flex-col gap-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <!-- Feedback -->
            <div id="feedback" class="mt-8 hidden animate-fade-in-up">
                <!-- Feedback content -->
            </div>

            <!-- Footer Actions -->
            <div class="mt-10 pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <button id="resetBtn" class="text-sm font-medium text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
                    Restart Session
                </button>
                
                <div class="flex gap-3">
                    <button id="checkBtn" class="hidden px-6 py-2.5 rounded-xl bg-slate-900 text-white hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100 font-semibold shadow-lg shadow-slate-900/10 transition-all transform active:scale-95">
                        Check Answer
                    </button>
                    <button id="nextBtn" class="hidden px-6 py-2.5 rounded-xl bg-brand-600 text-white hover:bg-brand-700 font-semibold shadow-lg shadow-brand-500/20 transition-all transform active:scale-95 flex items-center gap-2">
                        Next Question <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Final Screen -->
        <div id="final" class="hidden flex-1 flex flex-col items-center justify-center bg-white dark:bg-dark-card border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-10 text-center">
            <div class="w-24 h-24 rounded-full bg-yellow-50 dark:bg-yellow-900/20 flex items-center justify-center mb-6 text-yellow-500 text-4xl shadow-sm">
                <i class="fa-solid fa-trophy"></i>
            </div>
            
            <h2 class="text-3xl font-bold mb-2">Session Complete!</h2>
            <p class="text-slate-500 mb-8">You've reached the end of this module.</p>
            
            <div class="grid grid-cols-2 gap-8 mb-10 w-full max-w-sm">
                <div class="text-center p-4 rounded-xl bg-slate-50 dark:bg-slate-800">
                    <div class="text-sm text-slate-500 mb-1">Score</div>
                    <div id="finalScore" class="text-3xl font-bold text-slate-900 dark:text-white">0%</div>
                </div>
                <div class="text-center p-4 rounded-xl bg-slate-50 dark:bg-slate-800">
                    <div class="text-sm text-slate-500 mb-1">Questions</div>
                    <div id="finalTotal" class="text-3xl font-bold text-slate-900 dark:text-white">0</div>
                </div>
            </div>

            <div class="flex gap-4">
                <a href="../index.html" class="px-6 py-3 rounded-xl border border-slate-200 dark:border-slate-700 font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    Back to Dashboard
                </a>
                <button id="restartBtn" class="px-6 py-3 rounded-xl bg-brand-600 text-white font-medium hover:bg-brand-700 shadow-lg shadow-brand-500/20 transition-colors">
                    Try Again
                </button>
            </div>
        </div>

    </main>

    <!-- App Logic -->
    <script src="../app.js"></script>

</body>
</html>
